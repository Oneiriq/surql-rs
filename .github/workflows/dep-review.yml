name: Dependency Review

on:
  pull_request:
    branches:
      - main
      - 'release/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  dep-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

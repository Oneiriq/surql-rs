name: CI

on:
  pull_request:
    branches:
      - main
      - 'release/**'
  # Keep push-on-main so coverage / merge-commit verification still
  # runs after a merge, but DROP push-on-release/** — those branches
  # only ever receive PRs that already fired this workflow via
  # pull_request, so push-on-release/** is pure duplicated work.
  push:
    branches:
      - main

permissions:
  contents: read

# Per-ref concurrency: a new push to a branch (or new push to the
# PR head) cancels the in-progress run for the same ref. Cuts queue
# pressure on the aur0 self-hosted runner.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint-test:
    name: Lint and Test (${{ matrix.os }} / ${{ matrix.rust }})
    runs-on: [self-hosted, aur0]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-${{ matrix.os }}-${{ matrix.rust }}"

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check compilation
        run: cargo check --all-targets --all-features

      - name: Run unit tests
        run: cargo test --lib --all-features

      - name: Run doc tests
        run: cargo test --doc --all-features

  client-rustls-build:
    name: Build client-rustls (no openssl-sys)
    runs-on: [self-hosted, aur0]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-ubuntu-rustls"

      # The point of the `client-rustls` feature is to unblock builds on
      # runners / images that do not ship `libssl-dev`. Verify the feature
      # compiles without touching the default `client` stack, and assert
      # that `openssl-sys` is absent from the resolved dependency graph.
      - name: Build with client-rustls
        run: cargo build --no-default-features --features client-rustls

      - name: Check compilation with client-rustls
        run: cargo check --no-default-features --features client-rustls --all-targets

      - name: Assert openssl-sys is not in the dep graph
        run: |
          if cargo tree --no-default-features --features client-rustls --prefix none \
              | grep -E '^(openssl|openssl-sys|native-tls) '; then
            echo "client-rustls pulled an OpenSSL / native-tls crate; the feature is broken." >&2
            exit 1
          fi

  integration:
    name: Integration Tests
    runs-on: [self-hosted, aur0]
    steps:
      - uses: actions/checkout@v6

      - name: Start SurrealDB
        run: |
          docker run -d \
            --name surrealdb \
            -p 8000:8000 \
            surrealdb/surrealdb:v3.0.5 \
            start --user root --pass root memory
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health; then
              echo "SurrealDB ready"
              break
            fi
            echo "Waiting for SurrealDB... attempt $i"
            sleep 2
          done

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run integration tests
        # --test-threads=1 because the tests share a single namespace /
        # database; running them in parallel causes SurrealDB write
        # conflicts ("Failed to commit transaction due to a read or
        # write conflict").
        run: |
          if [ -d tests ] && ls tests/*.rs >/dev/null 2>&1; then
            cargo test --all-features --tests -- --test-threads=1
          else
            echo "No integration tests yet; skipping."
          fi
        env:
          SURREAL_URL: ws://localhost:8000
          SURREAL_USER: root
          SURREAL_PASS: root

      - name: Stop SurrealDB
        if: always()
        run: docker stop surrealdb || true

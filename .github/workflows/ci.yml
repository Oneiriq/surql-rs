name: CI

# Single, gated pipeline for push and pull-request events. Every
# stage downstream of `lint` only runs once its prerequisites pass, so
# a fmt / clippy / test failure short-circuits the entire run instead
# of fanning out to coverage / integration / audit / docs in parallel.
#
# Job DAG:
#
#   lint -> test ---> integration -+
#        |       \--> coverage ----+
#        |--> build-rustls --------+
#        |--> audit ---------------+--> docs-build --> docs-approval --> docs-deploy
#
# `docs-approval` and `docs-deploy` only fire on push to main; the
# approval environment is required-reviewer-gated, so a human signs
# off before Pages publishes.

on:
  pull_request:
    branches:
      - main
      - 'release/**'
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

# Per-ref concurrency so a new push to the same branch cancels the
# in-flight pipeline. Saves runner time on rapid pushes / force-pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: Lint (fmt + clippy)
    # Refuse to run on PRs opened from a fork. The downstream jobs
    # all `needs: lint` so this single guard cascades and skips the
    # entire pipeline for fork PRs. Push events only ever fire from
    # within this repo (GitHub does not run push workflows on
    # forks against the upstream repo's workflow files), so the
    # `push` branch of the condition is always true.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, aur0]
    steps:
      - uses: actions/checkout@v6

      # `cargo clippy --all-features` enables the legacy `client`
      # feature which links `openssl-sys`; needs system OpenSSL
      # headers on the runner image.
      - name: Install libssl-dev
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends libssl-dev pkg-config
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-ubuntu-latest-stable"

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo check
        run: cargo check --all-targets --all-features

  test:
    name: Unit + Doc Tests
    needs: lint
    runs-on: [self-hosted, aur0]
    steps:
      - uses: actions/checkout@v6

      - name: Install libssl-dev
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends libssl-dev pkg-config
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-ubuntu-latest-stable"

      - name: cargo test --lib
        run: cargo test --lib --all-features

      - name: cargo test --doc
        run: cargo test --doc --all-features

  build-rustls:
    name: Build client-rustls (no openssl-sys)
    needs: lint
    runs-on: [self-hosted, aur0]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-ubuntu-rustls"

      - name: cargo build (client-rustls only)
        run: cargo build --no-default-features --features client-rustls

      - name: cargo check (client-rustls only)
        run: cargo check --no-default-features --features client-rustls --all-targets

      - name: Assert openssl-sys / native-tls absent from dep graph
        run: |
          if cargo tree --no-default-features --features client-rustls --prefix none \
              | grep -E '^(openssl|openssl-sys|native-tls) '; then
            echo "client-rustls pulled an OpenSSL / native-tls crate; the feature is broken." >&2
            exit 1
          fi

  audit:
    name: cargo audit
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # RUSTSEC-2023-0071 (`rsa` 0.9.x Marvin Attack timing sidechannel)
      # reaches us transitively via `surrealdb` 3.x with no upstream
      # patched version; revisit when upstream ships a fix or
      # `surrealdb` swaps RSA JWT verification for a constant-time
      # implementation. Informational unmaintained warnings stay
      # non-blocking because `--deny warnings` is not passed.
      - name: cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071

  integration:
    name: Integration Tests
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start SurrealDB
        run: |
          docker rm -f surrealdb >/dev/null 2>&1 || true
          docker run -d \
            --name surrealdb \
            -p 8000:8000 \
            surrealdb/surrealdb:v3.0.5 \
            start --user root --pass root memory
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "SurrealDB ready"
              break
            fi
            echo "Waiting for SurrealDB... attempt $i"
            sleep 2
          done
          curl -sf http://localhost:8000/health

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      # `--test-threads=1` because the tests share a single namespace
      # / database; running them in parallel causes SurrealDB write
      # conflicts.
      - name: Run integration tests
        run: |
          if [ -d tests ] && ls tests/*.rs >/dev/null 2>&1; then
            cargo test --all-features --tests -- --test-threads=1
          else
            echo "No integration tests yet; skipping."
          fi
        env:
          SURREAL_URL: ws://localhost:8000
          SURREAL_USER: root
          SURREAL_PASS: root

      - name: Stop SurrealDB
        if: always()
        run: docker rm -f surrealdb >/dev/null 2>&1 || true

  coverage:
    name: Coverage
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-coverage"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Collect coverage
        run: cargo llvm-cov --all-features --lib --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false

  docs-build:
    name: Build docs site
    needs: [test, integration, coverage, audit, build-rustls]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mkdocs-material mkdocs-minify-plugin

      - name: mkdocs build --strict
        run: mkdocs build --strict

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  docs-approval:
    name: Approve docs deploy
    needs: docs-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # `docs-deploy-approval` is a GitHub Environment with required
    # reviewers configured in repo settings. The job just waits on
    # human sign-off before docs-deploy fires.
    environment:
      name: docs-deploy-approval
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - run: echo "Awaiting approval for docs deploy to GitHub Pages..."

  docs-deploy:
    name: Deploy docs to GitHub Pages
    needs: docs-approval
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

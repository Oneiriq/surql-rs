name: Security Audit (scheduled)

# Daily safety net for `cargo audit`. The push / pull-request audit
# path now lives inside the consolidated `ci.yml` pipeline so it can
# gate `docs-deploy` directly; this workflow only fires on the cron
# schedule to catch new RUSTSEC advisories that appear when no
# commit lands.

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # See `ci.yml` for the rationale on `--ignore RUSTSEC-2023-0071`
      # (transitive `rsa` 0.9.x Marvin Attack, no upstream patch).
      - name: cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071

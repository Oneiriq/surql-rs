name: Release

# Triggers on a GitHub Release being published (or manual dispatch).
# Re-runs the audit + dry-run gates one last time, requires a human
# approver to clear the `crates-io-approval` environment, then
# publishes to crates.io. The `ci.yml` pipeline already audited the
# tagged commit on the way to `main`; running `cargo audit` again
# here catches the rare window where a new RUSTSEC advisory landed
# between merge and release.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify release readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        if: github.event_name == 'release'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CRATE_VERSION="$(cargo pkgid | sed -E 's/.*[#@]([^@#]+)$/\1/')"
          echo "Tag version:   $TAG_VERSION"
          echo "Crate version: $CRATE_VERSION"
          if [ "$TAG_VERSION" != "$CRATE_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match Cargo.toml version $CRATE_VERSION"
            exit 1
          fi

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071

      - name: cargo publish --dry-run
        run: cargo publish --dry-run --all-features

  approval:
    name: Approve crates.io publish
    needs: verify
    runs-on: ubuntu-latest
    # `crates-io-approval` is a GitHub Environment with required
    # reviewers configured in repo settings. The job just waits on
    # human sign-off before `publish` fires.
    environment:
      name: crates-io-approval
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - run: echo "Awaiting approval to publish to crates.io..."

  publish:
    name: Publish to crates.io
    needs: approval
    runs-on: ubuntu-latest
    environment:
      name: crates-io
      url: https://crates.io/crates/oneiriq-surql
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Publish
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

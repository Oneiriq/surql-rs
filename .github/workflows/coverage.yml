name: Coverage

on:
  pull_request:
    branches:
      - main
      - 'release/**'
  # Push-on-main only — release/** branches only ever receive PRs that
  # already fired this workflow, so push-on-release/** is duplicated
  # work.
  push:
    branches:
      - main

permissions:
  contents: read

# Per-ref concurrency: cancel any in-progress coverage run for the same
# ref when a new push lands. Saves ~5 min per redundant rev.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  coverage:
    name: cargo-llvm-cov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-coverage"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Collect coverage
        run: cargo llvm-cov --all-features --lib --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: false
